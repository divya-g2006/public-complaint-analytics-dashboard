<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef3ff"/>
    </linearGradient>
    <radialGradient id="mist" cx="30%" cy="30%" r="70%">
      <stop offset="0" stop-color="#6b7280" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6b7280" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg3)"/>
  <rect width="1200" height="700" fill="url(#mist)"/>

  <!-- Sanitation / waste issue illustration -->
  <g transform="translate(140,110)">
    <rect width="920" height="480" rx="28" fill="#ffffff" opacity="0.92" stroke="#e5e7eb" stroke-width="3"/>

    <!-- Left: bins -->
    <g transform="translate(60,90)">
      <rect x="0" y="40" width="180" height="220" rx="18" fill="rgba(11,92,171,0.08)" stroke="rgba(11,92,171,0.22)" stroke-width="3"/>
      <rect x="220" y="40" width="180" height="220" rx="18" fill="rgba(107,114,128,0.08)" stroke="rgba(107,114,128,0.22)" stroke-width="3"/>
      <rect x="14" y="66" width="152" height="14" rx="7" fill="#0b1f33" opacity="0.16"/>
      <rect x="234" y="66" width="152" height="14" rx="7" fill="#0b1f33" opacity="0.14"/>
      <rect x="34" y="98" width="112" height="150" rx="16" fill="#0b5cab" opacity="0.10"/>
      <rect x="254" y="98" width="112" height="150" rx="16" fill="#6b7280" opacity="0.10"/>
    </g>

    <!-- Right: waste pile -->
    <g transform="translate(540,190)">
      <path d="M40 240 C 110 160, 190 270, 270 190 C 340 120, 380 170, 420 150 L 420 280 L 40 280 Z" fill="rgba(31,41,55,0.08)"/>
      <g fill="rgba(107,114,128,0.25)">
        <circle cx="90" cy="220" r="22"/>
        <circle cx="150" cy="205" r="18"/>
        <circle cx="210" cy="220" r="24"/>
        <circle cx="270" cy="205" r="20"/>
        <circle cx="330" cy="215" r="22"/>
      </g>
      <g fill="rgba(11,92,171,0.18)">
        <rect x="120" y="170" width="56" height="30" rx="10"/>
        <rect x="260" y="168" width="70" height="34" rx="12"/>
      </g>
      <g stroke="#ef4444" stroke-width="6" stroke-linecap="round" opacity="0.85">
        <path d="M40 120 L 420 120"/>
        <path d="M80 90 L 120 150"/>
        <path d="M120 90 L 80 150"/>
      </g>
    </g>

    <!-- Footer text lines -->
    <g transform="translate(60,420)">
      <rect width="700" height="18" rx="9" fill="#0b1f33" opacity="0.10"/>
      <rect y="28" width="640" height="18" rx="9" fill="#0b1f33" opacity="0.07"/>
    </g>
  </g>
</svg>

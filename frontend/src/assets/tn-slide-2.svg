<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef3ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="30%" r="55%">
      <stop offset="0" stop-color="#0b5cab" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0b5cab" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#glow)"/>

  <!-- Street light -->
  <g transform="translate(820,130)">
    <rect x="160" y="60" width="26" height="420" rx="13" fill="#0b1f33" opacity="0.75"/>
    <rect x="112" y="60" width="90" height="20" rx="10" fill="#0b1f33" opacity="0.75"/>
    <circle cx="112" cy="70" r="22" fill="#0b1f33" opacity="0.75"/>
    <circle cx="112" cy="70" r="10" fill="#6b7280" opacity="0.35"/>
    <!-- Broken bulb (cross) -->
    <path d="M98 56 L 126 84" stroke="#ef4444" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <path d="M126 56 L 98 84" stroke="#ef4444" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <!-- Light cone -->
    <path d="M112 88 C 50 155, 40 240, 10 360 C 80 360, 160 360, 230 360 C 200 240, 185 155, 112 88 Z" fill="#fbbf24" opacity="0.10"/>
  </g>

  <!-- Foreground card -->
  <g transform="translate(110,150)">
    <rect width="760" height="440" rx="26" fill="#ffffff" opacity="0.92" stroke="#e5e7eb" stroke-width="3"/>
    <rect x="34" y="34" width="340" height="18" rx="9" fill="#0b1f33" opacity="0.28"/>
    <rect x="34" y="66" width="520" height="14" rx="7" fill="#6b7280" opacity="0.18"/>
    <rect x="34" y="92" width="460" height="14" rx="7" fill="#6b7280" opacity="0.14"/>

    <!-- Status bars -->
    <rect x="34" y="150" width="690" height="18" rx="9" fill="#0b5cab" opacity="0.10"/>
    <rect x="34" y="180" width="610" height="18" rx="9" fill="#0b5cab" opacity="0.07"/>
    <rect x="34" y="210" width="560" height="18" rx="9" fill="#0b5cab" opacity="0.06"/>

    <!-- Buttons -->
    <rect x="34" y="320" width="220" height="52" rx="16" fill="#0b5cab" opacity="0.90"/>
    <rect x="270" y="320" width="190" height="52" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>

    <!-- Badge -->
    <rect x="34" y="392" width="310" height="18" rx="9" fill="#6b7280" opacity="0.12"/>
  </g>
</svg>
